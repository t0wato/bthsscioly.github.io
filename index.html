    <style>
        body {
            font-family: Courier New, Courier, monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #107AB0;
            overflow-x: hidden;
            position: relative;
        }
        h1 {
            color: #FFF;
            text-align: center;
            position: relative;
            z-index: 10;
        a {
            color: #FFF;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        }
        h2 {
            color: #FFF;
            href-align: center;
            position: relative;
            z-index: 10;
        }
        p {
            color: #CCC;
            line-height: 1.6;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            opacity: 0.6;
        }
        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
        }
        .cloud::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }
        .cloud::after {
            width: 60px;
            height: 60px;
            top: -30px;
            right: 10px;
        }
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 10%;
            animation: float 80s infinite linear;
        }
       
        @keyframes float {
            from {
                left: -200px;
            }
            to {
                left: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="cloud-container">
        <div class="cloud cloud1"></div>
    </div>
