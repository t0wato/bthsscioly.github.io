<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Website! 🎉</h1>
    <p>This is your first HTML page. You can edit it and make it your own!</p>
    <button onclick="alert('Hello! You clicked the button!')">Click Me!</button>
    
    <hr>
    <h2>Some tips:</h2>
    <ul>
        <li>Change the title in the &lt;title&gt; tag</li>
        <li>Edit the text between &lt;h1&gt; tags</li>
        <li>Add more paragraphs with &lt;p&gt; tags</li>
        <li>Change colors in the &lt;style&gt; section</li>
    </ul>
</body>
</html>
