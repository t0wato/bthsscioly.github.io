<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> BTHS Science Olympiad</title>
    <style>
        body {
            font-family: Courier New, Courier, monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #107AB0;
            overflow-x: hidden;
            position: relative;
        }
        h1 {
            color: #FFF;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        p {
            color: #CCC;
            line-height: 1.6;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            position: relative;
            z-index: 10;
        }
        button:hover {
            background-color: #0056b3;
        }
        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            position: relative;
            z-index: 10;
        }
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            opacity: 0.6;
        }
        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
        }
        .cloud::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }
        .cloud::after {
            width: 60px;
            height: 60px;
            top: -30px;
            right: 10px;
        }
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 10%;
            animation: float 80s infinite linear;
        }
        .cloud2 {
            width: 80px;
            height: 35px;
            top: 25%;
            animation: float 90s infinite linear;
        }
        .cloud3 {
            width: 90px;
            height: 38px;
            top: 50%;
            animation: float 100s infinite linear;
        }
        .cloud4 {
            width: 70px;
            height: 30px;
            top: 65%;
            animation: float 85s infinite linear;
        }
        @keyframes float {
            from {
                left: -200px;
            }
            to {
                left: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="cloud-container">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
    </div>
    <h1>bths scioly page</h1>
    <p>Welcome to One of the Top Science Olympiad Teams in NY State!</p>
    <p>This is a first draft, not affiliated with the school's team (yet).</p>
    <a href="https://instagram.com">
        <button class= "button container">
    </a>
</body>
</html>
